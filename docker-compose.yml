version: "3.9"

services:
  app:
    build: .
    container_name: yatindoweb_app
    volumes:
      - .env:/var/www/.env
      - ./storage:/var/www/storage
    restart: always

  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always